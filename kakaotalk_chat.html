<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KakaoTalk Chat — 레이우엔훅과 왕립학회 (1676)</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1a1a;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}

.phone-frame {
  width: 390px;
  height: 844px;
  background: #fff;
  border-radius: 44px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 3px #333, 0 0 60px rgba(0,0,0,0.5);
  position: relative;
}

.status-bar {
  height: 54px;
  background: #fff;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 32px 8px;
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  flex-shrink: 0;
}

.status-icons { font-size: 11px; letter-spacing: 1px; }

.chat-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 1;
  transition: opacity 0.5s ease;
}

.chat-screen.fading { opacity: 0; }

.chat-header {
  height: 52px;
  background: #fff;
  display: flex;
  align-items: center;
  padding: 0 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #eee;
}

.header-left { width: 40px; display: flex; align-items: center; }
.header-center { flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
.header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.header-count { font-size: 13px; color: #999; }
.header-right { width: 70px; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

.chat-body {
  flex: 1;
  background: #B2C7D9;
  overflow-y: auto;
  padding: 12px 14px;
  scroll-behavior: smooth;
}

.chat-body::-webkit-scrollbar { display: none; }
.chat-body { -ms-overflow-style: none; scrollbar-width: none; }

.date-divider { display: flex; justify-content: center; margin: 8px 0 16px; }
.date-divider span { background: rgba(0,0,0,0.12); color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 12px; }

.message-row { display: flex; align-items: flex-start; margin-bottom: 6px; gap: 6px; }
.message-row.continuation { margin-top: -2px; }

.avatar-col { width: 40px; flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; }
.avatar { width: 40px; height: 40px; border-radius: 14px; object-fit: cover; }

.bubble-col { max-width: calc(100% - 100px); display: flex; flex-direction: column; }
.sender-name { font-size: 12px; color: rgba(0,0,0,0.55); margin-bottom: 3px; padding-left: 2px; }

.bubble {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.45;
  word-break: break-word;
  white-space: pre-wrap;
  max-width: 100%;
  width: fit-content;
}

.message-row.left .bubble { background: #fff; color: #1a1a1a; border-top-left-radius: 4px; }
.message-row.left.continuation .bubble { border-top-left-radius: 14px; }

.message-row.right { justify-content: flex-end; }
.message-row.right .bubble-col { align-items: flex-end; }
.message-row.right .bubble { background: #FEE500; color: #1a1a1a; border-top-right-radius: 4px; }
.message-row.right.continuation .bubble { border-top-right-radius: 14px; }

.chat-image { width: 180px; border-radius: 14px; object-fit: cover; }

@keyframes messageIn {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
.message-row.animate-in, .replay-row.animate-in { animation: messageIn 0.35s ease-out forwards; }

.replay-row { display: flex; justify-content: center; margin: 24px 0 12px; }
.replay-btn {
  background: rgba(0,0,0,0.25);
  color: #fff;
  border: none;
  padding: 10px 28px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.replay-btn:hover { background: rgba(0,0,0,0.4); }
</style>
</head>

// ── State ──
const INITIAL_DELAY = 2000;
const SAME_SENDER_DELAY = 700;
const DIFF_SENDER_DELAY = 1800;
const ROOM_TRANSITION_DELAY = 3000;

let roomIndex = 0;
let visibleCount = 0;
let transitioning = false;
let done = false;

const chatScreen = document.getElementById('chatScreen');
const chatHeader = document.getElementById('chatHeader');
const chatBody = document.getElementById('chatBody');

function renderHeader() {
  const room = chatRooms[roomIndex];
  chatHeader.innerHTML = `
    <div class="header-left">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-center">
      <span class="header-title">${room.title}</span>
      ${room.type === 'group' ? `<span class="header-count">${room.participantCount}</span>` : ''}
    </div>
    <div class="header-right">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="#1A1A1A" stroke-width="2"/>
        <path d="M16 16l4 4" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>`;
}

function renderMessages() {
  const room = chatRooms[roomIndex];
  const msgs = room.messages.slice(0, visibleCount);
  let html = `<div class="date-divider"><span>${room.date}</span></div>`;

  msgs.forEach((msg, idx) => {
    const profile = profiles[msg.sender];
    const showProfile = idx === 0 || msg.sender !== msgs[idx - 1].sender;
    const isNew = idx === visibleCount - 1;
    const classes = ['message-row', msg.side];
    if (isNew) classes.push('animate-in');
    if (!showProfile) classes.push('continuation');

    html += `<div class="${classes.join(' ')}">`;

    if (msg.side === 'left') {
      html += `<div class="avatar-col">`;
      if (showProfile) {
        html += `<img src="${profile.image}" alt="" class="avatar">`;
      }
      html += `</div>`;
    }

    html += `<div class="bubble-col">`;
    if (msg.side === 'left' && showProfile) {
      html += `<div class="sender-name">${profile.name}</div>`;
    }
    if (msg.type === 'image') {
      html += `<img src="${msg.image}" alt="" class="chat-image">`;
    } else {
      html += `<div class="bubble">${msg.text}</div>`;
    }
    html += `</div></div>`;
  });

  if (done) {
    html += `<div class="replay-row animate-in"><button class="replay-btn" onclick="restart()">다시 보기</button></div>`;
  }

  html += `<div id="bottom" style="height:20px"></div>`;
  chatBody.innerHTML = html;

  const bottom = document.getElementById('bottom');
  if (bottom) bottom.scrollIntoView({ behavior: 'smooth' });
}

function scheduleNext() {
  if (transitioning || done) return;

  const room = chatRooms[roomIndex];
  const messages = room.messages;

  if (visibleCount === 0) {
    const delay = roomIndex === 0 ? INITIAL_DELAY : 1500;
    setTimeout(() => { visibleCount = 1; render(); scheduleNext(); }, delay);
    return;
  }

  if (visibleCount >= messages.length) {
    if (roomIndex < chatRooms.length - 1) {
      setTimeout(() => {
        transitioning = true;
        chatScreen.classList.add('fading');
        setTimeout(() => {
          roomIndex++;
          visibleCount = 0;
          transitioning = false;
          chatScreen.classList.remove('fading');
          render();
          scheduleNext();
        }, 600);
      }, ROOM_TRANSITION_DELAY);
    } else {
      done = true;
      render();
    }
    return;
  }

  const prev = messages[visibleCount - 1];
  const next = messages[visibleCount];
  const delay = next.sender !== prev.sender ? DIFF_SENDER_DELAY : SAME_SENDER_DELAY;
  setTimeout(() => { visibleCount++; render(); scheduleNext(); }, delay);
}

function render() {
  renderHeader();
  renderMessages();
}

function restart() {
  roomIndex = 0;
  visibleCount = 0;
  transitioning = false;
  done = false;
  chatScreen.classList.remove('fading');
  render();
  scheduleNext();
}

// Start
render();
scheduleNext();
</script>
